[package]
name = "crypto-client"
version = "0.1.0"
edition = "2021"

[dependencies]
cosign2 = { workspace = true, default-features = false, features = ["std"] }
crypto = { workspace = true }
fs = { workspace = true }
fw-utils = { path = "../../utils/fw-utils" }
hmac = "0.12.1"
log = "0.4.14"
log-server = { package = "xous-api-log", path = "../../xous/api/log" }
server = { path = "../../server" }
sha2 = { version = "0.10.8", default-features = false }
xous-ipc = { path = "../../xous/ipc" }
