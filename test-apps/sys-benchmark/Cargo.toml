[package]
name = "sys-benchmark"
version = "0.1.0"
edition = "2021"
description = "Measure various system functions"

# Dependency versions enforced by Cargo.lock.
[dependencies]
getrandom = { path = "../../imports/getrandom" }
log = "0.4.14"
log-server = { package = "xous-api-log", path = "../../xous/api/log" }
server = { path = "../../server" }
xous = { path = "../../xous/xous-rs" }
xous-api-names = { path = "../../xous/api/names" }

[target.'cfg(keyos)'.dependencies]
atsama5d27 = { workspace = true }
power-manager = { workspace = true }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(keyos)'] }
