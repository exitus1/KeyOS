[package]
name = "nfc-ndef"
version = "0.1.0"
edition = "2021"
description = "NFC server test client"

[dependencies]
backup-shard = { workspace = true }
log = "0.4.14"
log-server = { package = "xous-api-log", path = "../../xous/api/log" }
ndef = { workspace = true }
nfc = { path = "../../os/nfc" }
server = { path = "../../server" }
xous = { path = "../../xous/xous-rs" }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(keyos)'] }
