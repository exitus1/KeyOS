[package]
name = "update-server"
version = "0.1.0"
edition = "2021"

[dependencies]
bzip2 = { workspace = true }
cosign2 = { workspace = true }
crypto = { workspace = true }
file-backed = { path = "../../utils/file-backed" }
foundation-api = { workspace = true }
fs = { workspace = true }
fw-utils = { path = "../../utils/fw-utils" }
gui-server-api = { workspace = true }
keyos = { path = "../../keyos" }
log = "0.4.14"
log-server = { package = "xous-api-log", path = "../../xous/api/log" }
power-manager = { workspace = true }
qbsdiff = { workspace = true }
quantum-link = { workspace = true }
release-manifest = { path = "../../release-manifest" }
rkyv = { workspace = true }
security = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.128"
server = { path = "../../server" }
sha2 = "0.10.9"
tar = { workspace = true }
thiserror = "1.0"
update = { workspace = true }
whence = { path = "../../utils/whence" }
xous = { path = "../../xous/xous-rs" }
xous-names = { package = "xous-api-names", path = "../../xous/api/names" }
xous-ticktimer = { workspace = true }

[target.'cfg(keyos)'.dependencies]
atsama5d27 = { workspace = true, features = ["rkyv"] }
utralib = { workspace = true }

[dev-dependencies]
fs = { workspace = true, features = ["test"] }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(keyos)'] }

[features]
default = []
production = []
