[package]
name = "accelerometer"
version = "0.1.0"
edition = "2021"
publish = false

[features]
default = []

[dependencies]
log = "0.4.14"
log-server = { package = "xous-api-log", path = "../../xous/api/log" }
num-traits = "0.2.18"
rkyv = { workspace = true }
server = { path = "../../server" }
thiserror = "1.0"
xous = { path = "../../xous/xous-rs" }

[target.'cfg(keyos)'.dependencies]
embedded-hal = "1.0"
i2c = { workspace = true }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(keyos)'] }
