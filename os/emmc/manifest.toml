appId = "0x6f732f656d6d63000000000000000000"
memory = ["SDMMC0"]
syscall = ["ClaimInterrupt", "VirtToPhys", "SetThreadPriority"]

[appName]
en = "eMMC Server"

[servers."os/emmc"]
ReadBlocks = { id = 0, type = "lendMut" }
