[package]
name = "gui-app-keyboard"
version = "0.1.0"
edition = "2021"

[features]
default = []
recovery-os = []

[dependencies]
ab_glyph = { version = "0.2", default-features = false, features = ["std"] }
fs = { workspace = true }
gui-server-api = { workspace = true }
haptics = { workspace = true }
libblur = { workspace = true, default-features = false }
log = "0.4"
log-server = { package = "xous-api-log", path = "../../xous/api/log" }
num-traits = "0.2"
server = { path = "../../server" }
settings = { workspace = true }
tiny-skia = "0.11"
worker = { path = "../../worker" }
xous = { path = "../../xous/xous-rs" }
xous-api-ticktimer = { path = "../../xous/api/ticktimer" }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(keyos)'] }

[build-dependencies]
image = { version = "0.25", default-features = false, features = ["png"] }
resvg = { version = "0.44.0", default-features = false, features = ["text"] }
