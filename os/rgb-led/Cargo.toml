[package]
name = "rgb-led-server"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
log = "0.4.14"
log-server = { package = "xous-api-log", path = "../../xous/api/log" }
rgb-led = { workspace = true }
server = { path = "../../server" }
thiserror = "1.0"
xous = { path = "../../xous/xous-rs" }

[target.'cfg(keyos)'.dependencies]
embedded-hal = "1.0"
gpio = { workspace = true }
i2c = { workspace = true }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(keyos)'] }
