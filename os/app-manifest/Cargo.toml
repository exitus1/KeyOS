[package]
name = "app-manifest"
version = "0.1.0"
edition = "2021"

[dependencies]
hex = "0.4.3"
serde = { version = "1.0.190", features = ["derive"] }
serde_json = "1.0.108"

[target.'cfg(not(keyos))'.dependencies]
cargo_metadata = "0.18.1"
once_cell = "1.20.3"
toml = "0.9.7"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(keyos)'] }
