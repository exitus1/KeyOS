appId = "0xa7a5a9ea2f27706e0a541bb463ab2240"

[appName]
en = "CTAPHID Server"

[servers."os/ctap-hid"]
ProcessHidPacket = { id = 0, type = "archive" }
RegisterSimuUsbReceiver = { id = 64, type = "blockingScalar", cfg = "feature = \"test-app\"" }

[permissions]
"os/fido" = ["U2fProcessApdu", "CtapProcessCbor"]
"os/rgb-server" = ["AnimateAllTo"]
"os/usbdev" = [
    "ReadEndpoint",
    "WriteEndpoint",
    "NumInterfaces",
    "RegisterSetupResponder",
    "RegisterInterface",
    "WaitForConnection",
    "ResetController",
]
