[package]
name = "fw-utils"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0.80"
app-manifest = { path = "../../os/app-manifest" }
hex = "0.4.3"
log = "0.4.14"
serde = { version = "1.0" }
serde_json = "1.0.114"
server = { path = "../../server" }
thiserror = "1.0"
xous = { path = "../../xous/xous-rs" }
xous-ipc = { path = "../../xous/ipc" }

[target.'cfg(keyos)'.dependencies]
atsama5d27 = { workspace = true }
cosign2 = { workspace = true, default-features = false, features = ["std"] }
crypto = { workspace = true }
fs = { workspace = true }
micro-ecc-sys = { path = "../../imports/micro-ecc-sys", default-features = false }
sha2 = { version = "0.10.8", default-features = false }
utralib = { workspace = true }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(keyos)'] }
