[package]
name = "secrets-gen2"
version = "0.1.0"
edition = "2021"
description = "A flexible, configuration-driven utility for generating cryptographic keys and injecting them into various file types"
authors = ["Foundation Devices"]

[workspace]

[dependencies]
anyhow = "1.0"
base64 = "0.21"
# CLI
clap = { version = "4.4", features = ["derive"] }
dirs = "5.0"
hex = "0.4"
k256 = { version = "0.13", features = ["pem"] }

# Cryptography
p256 = { version = "0.13", features = ["pem"] }
rand = "0.8"

# File handling
regex = "1.10"

# Configuration and serialization
serde = { version = "1.0", features = ["derive"] }
sha2 = "0.10"
thiserror = "1.0"
toml = "0.8"

[dev-dependencies]
assert_fs = "1.0"
predicates = "3.0"
tempfile = "3.8"
