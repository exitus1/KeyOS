[package]
name = "slint-keyos-platform-build"
version = "0.1.0"
edition = "2021"
description = "KeyOS platform support for Slint UI framework"

[dependencies]
anyhow = "1.0"
euclid = "0.22"
image = "0.25"
indoc = "2.0.5"
itertools = "0.13.0"
miette = { version = "7.2.0", features = ["fancy"] }
once_cell = "1.20.3"
phf_codegen = "0.11"
qrcode = { version = "0.12", default-features = false }
resvg = { version = "0.44.0", default-features = false, features = ["text"] }
rkyv = { workspace = true }
serde_json = "1.0"
slint-keyos-platform-common = { path = "../common", features = [
    "i-slint-compiler",
] }
slotmap = "1.0.7"
spin_on = { version = "0.1.1" }
textwrap = { version = "0.16.1" }
thiserror = { version = "1.0" }
toml = "0.8.14"

[dependencies.i-slint-compiler]
workspace = true

[dependencies.slint]
features = [
    "compat-1-2",
    "unsafe-single-threaded",
    "renderer-software",
    "serde",
]
workspace = true

[dependencies.slint-build]
workspace = true

[dev-dependencies]
temp-dir = "0.1.14"
