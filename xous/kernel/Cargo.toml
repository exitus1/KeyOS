[package]
authors = [
    "Sean Cross <sean@xobs.io>",
    "Foundation Devices, Inc. <hello@foundation.xyz>",
]
description = "KeyOS kernel"
license = "MIT OR Apache-2.0"
edition = "2021"
name = "keyos-kernel"
version = "1.2.0"
resolver = "2"

[features]
debug-print = []
log-serial = []

trace-systemview = ["systemview-keyos", "keyos/trace-systemview"]
trace-aborts-systemview = [
    "trace-systemview",
] # Tracing of aborts is when you want to go deeper

production = []

integration-test = []

# Dependency versions enforced by Cargo.lock.
[dependencies]
bitflags = "1.2.1"
bitvec = { version = "1.0.1", default-features = false }
keyos = { path = "../../keyos" }
xous = { path = "../xous-rs", features = ["forget-memory-messages"] }

[target.'cfg(keyos)'.dependencies]
armv7 = { workspace = true, features = ["critical-section"] }
atsama5d27 = { workspace = true }
critical-section = "1.1.1"
fuse = { path = "../../utils/fuse" }
num-derive = "0.4.2"
num-traits = { version = "0.2.18", default-features = false }
keyos = { path = "../../keyos" }
securam-manager = { path = "../../imports/securam-manager" }
systemview-keyos = { path = "../../systemview-keyos", optional = true }
utralib = { workspace = true }
xmas-elf = "0.10.0"
xous = { path = "../xous-rs" }

[target.'cfg(not(keyos))'.dependencies]
crossbeam-channel = "0.5.15"
hex = "0.4"
once_cell = "1.20.3"
rand = "0.7.3"
rand_chacha = "0.3.1"

[build-dependencies]
vergen-git2 = { version = "1.0.7" }

[target.'cfg(not(keyos))'.dev-dependencies]
xous = { path = "../xous-rs", features = [
    "forget-memory-messages",
    "processes-as-threads",
] }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(keyos)'] }
