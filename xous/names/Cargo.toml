[package]
authors = ["bunnie <bunnie@kosagi.com>"]
description = "Xous microkernel OS inter-process name resolution server"
edition = "2018"
name = "xous-names"
version = "0.9.34"
license = "MIT OR Apache-2.0"
repository = "https://github.com/betrusted-io/xous-core/"
homepage = "https://betrusted.io/"

[features]
hosted = []
debugprint = []
default = []    # "debugprint"

# Dependency versions enforced by Cargo.lock.
[dependencies]
app-manifest = { path = "../../os/app-manifest" }
log = "0.4.14"
log-server = { package = "xous-api-log", path = "../api/log" }
num-derive = "0.4.2"
num-traits = "0.2.18"
once_cell = "1.20.3"
xous = { path = "../xous-rs" }
xous-api-names = { path = "../api/names" }
xous-ipc = { path = "../ipc" }
