[package]
name = "gui-app-switcher"
version = "0.1.0"
edition = "2021"

[dependencies]
app-manager = { workspace = true }
fs = { workspace = true }
log = "0.4.14"
log-server = { package = "xous-api-log", path = "../../xous/api/log" }
server = { workspace = true }
settings = { workspace = true }
slint-keyos-platform = { path = "../../slint-keyos-platform/runtime" }

[build-dependencies]
slint-keyos-platform-build = { path = "../../slint-keyos-platform/build", default-features = false }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(keyos)'] }
