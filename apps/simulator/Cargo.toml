[package]
name = "simulator"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
gui-server-api = { workspace = true }
image = "0.25"
log = "0.4.14"
log-server = { package = "xous-api-log", path = "../../xous/api/log" }
serde = "1.0"
serde_json = "1.0"
server = { path = "../../server" }
settings = { workspace = true }

[dependencies.slint]
features = [
    "std",
    "serde",
    "backend-winit",
    "renderer-software",
    "compat-1-2",
]
workspace = true

[build-dependencies]
slint-keyos-platform-common = { path = "../../slint-keyos-platform/common" }

[build-dependencies.slint-build]
workspace = true
