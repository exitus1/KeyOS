[package]
name = "gui-app-image-viewer"
version = "0.1.0"
edition = "2021"

[dependencies]
fs = { workspace = true }
image = { version = "0.25", default-features = false, features = ["bmp", "jpeg", "gif", "png"] }
log = "0.4.14"
log-server = { package = "xous-api-log", path = "../../xous/api/log" }
slint-keyos-platform = { path = "../../slint-keyos-platform/runtime" }

[build-dependencies]
slint-keyos-platform-build = { path = "../../slint-keyos-platform/build" }
